services:
  kokoclone:
    image: ghcr.io/chahero/kokoclone-fastapi-gpu:latest-arm64
    container_name: kokoclone-fastapi
    restart: always
    ports:
      - "8890:8880"
    environment:
      KOKOCLONE_ENABLE_WEBUI: "true"
      KOKOCLONE_TEMP_DIR: /tmp/kokoclone
      KOKOCLONE_MAX_CONCURRENT_JOBS: "1"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
      - model-cache:/app/model
      - voice-cache:/app/voice
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  huggingface-cache:
  model-cache:
  voice-cache:
